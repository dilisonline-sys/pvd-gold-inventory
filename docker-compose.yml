version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PG_HOST=db
      - PG_PORT=5432
      - PG_DATABASE=pvd_jewelry
      - PG_USER=pvd_admin
      - PG_PASSWORD=b72bfgfg
      - PG_SCHEMA=pvd_schema
      - PG_SSL=false
      - JWT_SECRET=b72bfgfg
      - JWT_EXPIRES_IN=12h
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pvd_jewelry
      POSTGRES_USER: pvd_admin
      POSTGRES_PASSWORD: b72bfgfg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pvd_admin -d pvd_jewelry"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
