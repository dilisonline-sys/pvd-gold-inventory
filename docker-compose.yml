version: '3.9'

services:
  web:
    build: .
    container_name: pvd_goldsmith
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=goldsmith.settings
      - DB_PATH=/app/data/db.sqlite3
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/accounts/login/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  db_data:
  media_data:
