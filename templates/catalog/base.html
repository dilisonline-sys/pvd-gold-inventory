<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Product Catalog{% endblock %} | PVD Goldsmith</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-dark: #a07830;
            --gold-light: #f5e6a3;
        }
        body { background: #f8f5f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .catalog-nav {
            background: #1a1a2e;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .catalog-nav .brand { color: var(--gold); font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; }
        .catalog-nav .brand small { color: rgba(255,255,255,0.5); font-size: 0.7rem; display: block; line-height: 1; }
        .catalog-nav .nav-link { color: rgba(255,255,255,0.75); font-size: 0.85rem; padding: 4px 12px; }
        .catalog-nav .nav-link:hover { color: var(--gold); }
        .catalog-footer { background: #1a1a2e; color: rgba(255,255,255,0.5); text-align: center; padding: 20px; font-size: 0.8rem; margin-top: 60px; }
        .btn-gold { background: var(--gold); border-color: var(--gold-dark); color: #fff; }
        .btn-gold:hover { background: var(--gold-dark); color: #fff; }
        .product-card {
            background: #fff; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer; text-decoration: none; color: inherit; display: block;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); color: inherit; }
        .product-card .card-img-wrap {
            height: 220px; overflow: hidden; background: #f0ece6;
            display: flex; align-items: center; justify-content: center;
        }
        .product-card .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .product-card .no-img { color: #c9a84c; opacity: 0.4; }
        .product-card .card-body { padding: 14px 16px; }
        .product-card .product-name { font-weight: 700; font-size: 1rem; color: #222; margin-bottom: 4px; }
        .product-card .product-meta { font-size: 0.8rem; color: #777; }
        .product-card .product-tag {
            display: inline-block; background: var(--gold-light); color: #6b4c00;
            padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin: 3px 2px 0;
        }
        .detail-img { width: 100%; max-height: 480px; object-fit: contain;
                      border-radius: 12px; background: #f0ece6; }
        .detail-label { font-size: 0.78rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-value { font-size: 1rem; font-weight: 600; color: #222; }
    </style>
</head>
<body>

<nav class="catalog-nav">
    <a href="{% url 'catalog:gallery' %}" style="text-decoration:none;">
        <div class="brand">
            <i class="bi bi-gem me-2"></i>PVD Goldsmith
            <small>Product Catalog</small>
        </div>
    </a>
    <div class="d-flex align-items-center gap-3">
        {% block nav_extra %}{% endblock %}
        <a href="{% url 'catalog:logout' %}" class="nav-link">
            <i class="bi bi-box-arrow-right me-1"></i>Sign Out
        </a>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<div class="catalog-footer">
    &copy; PVD Goldsmith Manufacturing — Product Catalog &mdash; Internal Use
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
