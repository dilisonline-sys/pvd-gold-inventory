<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Access | PVD Goldsmith</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --gold-dark: #a07830; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff; border-radius: 16px; padding: 48px 40px;
            width: 100%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .brand-icon { font-size: 3rem; color: var(--gold); }
        .btn-gold { background: var(--gold); border: none; color: #fff; font-weight: 600; }
        .btn-gold:hover { background: var(--gold-dark); color: #fff; }
        .form-control:focus { border-color: var(--gold); box-shadow: 0 0 0 0.25rem rgba(201,168,76,0.25); }
    </style>
</head>
<body>
<div class="login-card text-center">
    <div class="brand-icon mb-2"><i class="bi bi-gem"></i></div>
    <h4 class="fw-bold mb-1" style="color:#1a1a2e;">PVD Goldsmith</h4>
    <p class="text-muted small mb-4">Product Catalog — Enter your access password to continue</p>

    {% if error %}
    <div class="alert alert-danger text-start py-2 mb-3" style="font-size:0.88rem;">
        <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-4">
            <input type="password" name="password" class="form-control form-control-lg text-center"
                   placeholder="Enter catalog password" autofocus autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-gold btn-lg w-100">
            <i class="bi bi-unlock me-2"></i>Access Catalog
        </button>
    </form>

    <p class="text-muted mt-4 mb-0" style="font-size:0.75rem;">
        Staff login: <a href="{% url 'accounts:login' %}">click here</a>
    </p>
</div>
</body>
</html>
